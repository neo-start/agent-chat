<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: #111;
    border-bottom: 1px solid #222;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header h1 { font-size: 14px; color: #fff; letter-spacing: 0.05em; }
  .my-npub { font-size: 11px; color: #555; font-family: monospace; cursor: pointer; transition: color 0.2s; }
  .my-npub:hover { color: #888; }
  .dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }

  .main { display: flex; flex: 1; overflow: hidden; }

  .sidebar { width: 220px; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; background: #0d0d0d; }
  .sidebar-header { padding: 12px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; }
  .sidebar-header span { font-size: 11px; color: #444; text-transform: uppercase; letter-spacing: 0.08em; }
  .btn-add { background: none; border: 1px solid #333; color: #888; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.2s; }
  .btn-add:hover { border-color: #555; color: #ccc; }

  .contacts-list { flex: 1; overflow-y: auto; }
  .contact-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #111; transition: background 0.15s; display: flex; align-items: center; gap: 8px; position: relative; }
  .contact-item:hover { background: #141414; }
  .contact-item.active { background: #181818; }
  .contact-avatar { width: 32px; height: 32px; border-radius: 8px; background: #1e1e1e; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #666; flex-shrink: 0; position: relative; }
  .contact-info { min-width: 0; flex: 1; }
  .contact-name { font-size: 13px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .contact-key { font-size: 10px; color: #444; font-family: monospace; }
  .unread-badge { background: #4ade80; color: #000; border-radius: 10px; font-size: 10px; font-weight: 700; padding: 1px 6px; min-width: 18px; text-align: center; flex-shrink: 0; }

  .chat { flex: 1; display: flex; flex-direction: column; background: #080808; }
  .chat-header { padding: 12px 16px; border-bottom: 1px solid #1a1a1a; background: #0d0d0d; min-height: 49px; display: flex; align-items: center; justify-content: space-between; }
  .chat-header-info .contact-name { font-size: 13px; color: #ccc; }
  .chat-header-info .contact-key { font-size: 10px; color: #444; font-family: monospace; margin-top: 2px; }
  .btn-rename { background: none; border: 1px solid #222; color: #555; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: all 0.2s; }
  .btn-rename:hover { border-color: #444; color: #999; }
  .trust-badge { font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-left: 6px; font-weight: 600; }
  .trust-0 { background: #1a1a1a; color: #444; }
  .trust-1 { background: #1a2a1a; color: #4a8; }
  .trust-2 { background: #1a2035; color: #48f; }
  .trust-3 { background: #2a1a10; color: #f84; }
  .trust-select { background: #111; border: 1px solid #222; color: #777; font-size: 11px; border-radius: 4px; padding: 3px 6px; cursor: pointer; }

  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 6px; }
  .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #2a2a2a; font-size: 13px; }
  .date-divider { text-align: center; margin: 8px 0; }
  .date-divider span { font-size: 11px; color: #333; background: #0d0d0d; padding: 2px 10px; border-radius: 10px; }

  .msg { max-width: 70%; padding: 8px 12px; border-radius: 10px; font-size: 13px; line-height: 1.5; word-break: break-word; }
  .msg.sent { background: #1a1a1a; color: #e0e0e0; align-self: flex-end; border-bottom-right-radius: 3px; }
  .msg.received { background: #141414; color: #ccc; align-self: flex-start; border-bottom-left-radius: 3px; border: 1px solid #1e1e1e; }
  .msg.pending { opacity: 0.5; }
  .msg.failed { border: 1px solid #3a1515; }
  .msg-time { font-size: 10px; color: #444; margin-top: 3px; display: flex; align-items: center; justify-content: flex-end; gap: 4px; }
  .msg.received .msg-time { justify-content: flex-start; }
  .badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 600; letter-spacing: 0.04em; }
  .badge-agent { background: #1a2a1a; color: #4ade80; }
  .badge-human { background: #1a1a2a; color: #818cf8; }
  .badge-status { font-size: 9px; color: #555; }
  .badge-failed { color: #f87171; }
  .msg-json { font-family: monospace; font-size: 11px; background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 6px; padding: 8px; white-space: pre-wrap; }

  .input-area { padding: 12px; border-top: 1px solid #1a1a1a; display: flex; flex-direction: column; gap: 8px; background: #0d0d0d; }
  .input-row { display: flex; gap: 8px; align-items: center; }
  .btn-toggle { background: #1a1a2a; border: 1px solid #2a2a4a; color: #818cf8; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; white-space: nowrap; transition: all 0.2s; }
  .btn-toggle.agent { background: #1a2a1a; border-color: #2a4a2a; color: #4ade80; }
  .msg-input { flex: 1; background: #141414; border: 1px solid #222; border-radius: 8px; color: #e0e0e0; padding: 8px 12px; font-size: 13px; outline: none; resize: none; height: 38px; font-family: inherit; line-height: 1.4; transition: border-color 0.2s; }
  .msg-input:focus { border-color: #333; }
  .btn-send { background: #1e1e1e; border: 1px solid #2a2a2a; color: #888; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.2s; white-space: nowrap; }
  .btn-send:hover { background: #252525; color: #ccc; }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.show { display: flex; }
  .modal { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; width: 380px; max-width: 90vw; }
  .modal h3 { font-size: 14px; color: #ccc; margin-bottom: 16px; }
  .modal input { width: 100%; background: #0a0a0a; border: 1px solid #222; border-radius: 8px; color: #e0e0e0; padding: 8px 12px; font-size: 13px; outline: none; margin-bottom: 10px; font-family: monospace; }
  .modal input:focus { border-color: #333; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn-cancel { background: none; border: 1px solid #2a2a2a; color: #666; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .btn-confirm { background: #1e1e1e; border: 1px solid #333; color: #ccc; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
  .btn-confirm:hover { background: #252525; }

  .error-toast { position: fixed; bottom: 20px; right: 20px; background: #1a0a0a; border: 1px solid #3a1515; color: #f87171; padding: 10px 16px; border-radius: 8px; font-size: 12px; display: none; z-index: 200; }
  .error-toast.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="dot" id="statusDot"></div>
  <h1>Agent Chat</h1>
  <div class="my-npub" id="myNpub" title="Click to copy">—</div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Contacts</span>
      <button class="btn-add" onclick="showAddContact()">+ Add</button>
    </div>
    <div class="contacts-list" id="contactsList"></div>
  </div>

  <div class="chat">
    <div class="chat-header" id="chatHeader">
      <div class="empty-state" style="color:#1e1e1e; font-size:12px;">Select a contact</div>
    </div>
    <div class="messages" id="messages">
      <div class="empty-state">No conversation selected</div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea class="msg-input" id="msgInput" placeholder="Type a message..." disabled
          onkeydown="handleKey(event)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled>Send</button>
      </div>
      <div class="input-row" style="justify-content:flex-end">
        <button class="btn-toggle" id="toggleBtn" onclick="toggleSender()">👤 Human</button>
      </div>
    </div>
  </div>
</div>

<!-- Add contact modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Add Contact</h3>
    <input type="text" id="contactNpub" placeholder="npub... or hex public key" />
    <input type="text" id="contactName" placeholder="Name (optional)" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideModal('addModal')">Cancel</button>
      <button class="btn-confirm" onclick="addContact()">Add</button>
    </div>
  </div>
</div>

<!-- Rename contact modal -->
<div class="modal-overlay" id="renameModal">
  <div class="modal">
    <h3>Rename Contact</h3>
    <input type="text" id="renamePubkey" style="display:none" />
    <input type="text" id="renameInput" placeholder="New name" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideModal('renameModal')">Cancel</button>
      <button class="btn-confirm" onclick="doRename()">Save</button>
    </div>
  </div>
</div>

<div class="error-toast" id="errorToast"></div>

<script>
let ws = null
let myIdentity = null
let contacts = []
let activeContact = null
let messages = {}    // pubkey -> messages[]
let unread = {}      // pubkey -> count
let sendAsAgent = false

// ── WebSocket connection ───────────────────────────────────────────────────────

function connect() {
  ws = new WebSocket(`ws://${location.host}`)

  ws.onopen = () => {
    document.getElementById('statusDot').style.background = '#4ade80'
  }

  ws.onclose = () => {
    document.getElementById('statusDot').style.background = '#ef4444'
    setTimeout(connect, 2000)
  }

  ws.onmessage = (e) => {
    const { type, data } = JSON.parse(e.data)
    switch (type) {
      case 'identity':
        myIdentity = data
        const el = document.getElementById('myNpub')
        el.textContent = data.npub.slice(0, 16) + '...'
        el.title = data.npub + ' (click to copy)'
        el.onclick = () => { navigator.clipboard.writeText(data.npub); el.textContent = 'Copied!'; setTimeout(() => el.textContent = data.npub.slice(0,16)+'...', 1500) }
        // Request notification permission
        if (Notification.permission === 'default') Notification.requestPermission()
        break

      case 'contacts':
        contacts = data
        renderContacts()
        break

      case 'message':
        handleIncomingMessage(data)
        break

      case 'history':
        messages[data.pubkey] = data.messages
        if (activeContact?.pubkey === data.pubkey) renderMessages()
        break

      case 'error':
        showError(data)
        break
    }
  }
}

// ── Contacts ───────────────────────────────────────────────────────────────────

function renderContacts() {
  const list = document.getElementById('contactsList')
  if (contacts.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:#2a2a2a;font-size:12px;">No contacts yet</div>'
    return
  }
  list.innerHTML = contacts.map(c => {
    const count = unread[c.pubkey] || 0
    return `
    <div class="contact-item ${activeContact?.pubkey === c.pubkey ? 'active' : ''}"
         onclick="selectContact('${c.pubkey}')">
      <div class="contact-avatar">${(c.name || '?')[0].toUpperCase()}</div>
      <div class="contact-info">
        <div class="contact-name">${c.name || c.npub.slice(0,8)}</div>
        <div class="contact-key">${c.npub.slice(0,12)}...</div>
      </div>
      ${count > 0 ? `<div class="unread-badge">${count}</div>` : ''}
      <div class="trust-badge trust-${c.trustLevel||0}">${['🔇','💬','🔍','⚡'][c.trustLevel||0]}</div>
    </div>`
  }).join('')
}

function selectContact(pubkey) {
  activeContact = contacts.find(c => c.pubkey === pubkey)
  if (!activeContact) return

  unread[pubkey] = 0
  renderContacts()

  document.getElementById('chatHeader').innerHTML = `
    <div class="chat-header-info">
      <div class="contact-name">${activeContact.name || activeContact.npub.slice(0,16)}</div>
      <div class="contact-key">${activeContact.npub}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <select class="trust-select" onchange="setTrust('${activeContact.pubkey}', this.value)" title="Trust level">
        <option value="0" ${(activeContact.trustLevel||0)===0?'selected':''}>🔇 Silent</option>
        <option value="1" ${(activeContact.trustLevel||0)===1?'selected':''}>💬 Chat</option>
        <option value="2" ${(activeContact.trustLevel||0)===2?'selected':''}>🔍 Query</option>
        <option value="3" ${(activeContact.trustLevel||0)===3?'selected':''}>⚡ Exec</option>
      </select>
      <button class="btn-rename" onclick="showRename('${activeContact.pubkey}', '${activeContact.name || ''}')">Rename</button>
    </div>
  `

  document.getElementById('msgInput').disabled = false
  document.getElementById('sendBtn').disabled = false
  document.getElementById('msgInput').focus()

  if (!messages[pubkey]) {
    renderMessages()
    ws.send(JSON.stringify({ type: 'load_history', pubkey }))
  } else {
    renderMessages()
  }
}

// ── Messages ───────────────────────────────────────────────────────────────────

function handleIncomingMessage(msg) {
  // Update pending state if we find a matching temp message
  const key = msg.from === myIdentity?.pubkey ? msg.to : msg.from
  if (!messages[key]) messages[key] = []

  // Remove temp message if this is a confirmed sent message
  if (msg._tempId) {
    messages[key] = messages[key].filter(m => m.id !== msg._tempId)
  }

  if (!messages[key].find(m => m.id === msg.id)) {
    messages[key].push(msg)
    messages[key].sort((a, b) => a.created_at - b.created_at)
  }

  if (activeContact?.pubkey === key) {
    renderMessages()
  } else if (msg.from !== myIdentity?.pubkey) {
    // Increment unread for non-active contacts
    unread[key] = (unread[key] || 0) + 1
    renderContacts()
    // Desktop notification
    sendNotification(msg, key)
  }
}

function sendNotification(msg, contactPubkey) {
  if (Notification.permission !== 'granted') return
  if (document.hasFocus()) return
  const contact = contacts.find(c => c.pubkey === contactPubkey)
  const name = contact?.name || contactPubkey.slice(0, 8)
  const body = isJsonContent(msg.content) ? '[JSON message]' : msg.content.slice(0, 80)
  new Notification(`${name}`, { body, silent: false })
}

function isJsonContent(content) {
  if (!content.startsWith('{') && !content.startsWith('[')) return false
  try { JSON.parse(content); return true } catch { return false }
}

function renderMessages() {
  const container = document.getElementById('messages')
  const msgs = messages[activeContact?.pubkey] || []

  if (!activeContact) {
    container.innerHTML = '<div class="empty-state">No conversation selected</div>'
    return
  }
  if (msgs.length === 0) {
    container.innerHTML = '<div class="empty-state" style="color:#2a2a2a">No messages yet — say hi!</div>'
    return
  }

  // Group by date
  let lastDate = null
  const items = []

  for (const m of msgs) {
    const d = new Date(m.created_at * 1000)
    const dateKey = d.toLocaleDateString('zh', { year: 'numeric', month: 'long', day: 'numeric' })
    if (dateKey !== lastDate) {
      items.push(`<div class="date-divider"><span>${dateKey}</span></div>`)
      lastDate = dateKey
    }

    const sent = m.from === myIdentity?.pubkey
    const time = d.toLocaleTimeString('zh', { hour: '2-digit', minute: '2-digit' })
    const badge = m.isAgent
      ? '<span class="badge badge-agent">🤖 Agent</span>'
      : '<span class="badge badge-human">👤 Human</span>'
    const statusBadge = m._pending
      ? '<span class="badge-status">sending...</span>'
      : m._failed
        ? '<span class="badge-status badge-failed">failed</span>'
        : ''

    let contentHtml
    if (isJsonContent(m.content)) {
      try {
        const parsed = JSON.parse(m.content)
        contentHtml = `<div class="msg-json">${escapeHtml(JSON.stringify(parsed, null, 2))}</div>`
      } catch {
        contentHtml = escapeHtml(m.content).replace(/\n/g, '<br>')
      }
    } else {
      contentHtml = escapeHtml(m.content).replace(/\n/g, '<br>')
    }

    items.push(`
      <div class="msg ${sent ? 'sent' : 'received'} ${m._pending ? 'pending' : ''} ${m._failed ? 'failed' : ''}">
        ${contentHtml}
        <div class="msg-time">${badge} ${statusBadge} ${time}</div>
      </div>`)
  }

  container.innerHTML = items.join('')
  container.scrollTop = container.scrollHeight
}

// ── Send message ───────────────────────────────────────────────────────────────

function toggleSender() {
  sendAsAgent = !sendAsAgent
  const btn = document.getElementById('toggleBtn')
  btn.textContent = sendAsAgent ? '🤖 Agent' : '👤 Human'
  btn.className = 'btn-toggle' + (sendAsAgent ? ' agent' : '')
}

function sendMessage() {
  if (!activeContact || !ws) return
  const input = document.getElementById('msgInput')
  const content = input.value.trim()
  if (!content) return

  // Optimistic UI: add pending message immediately
  const tempId = 'temp_' + Date.now()
  const tempMsg = {
    id: tempId,
    from: myIdentity.pubkey,
    to: activeContact.pubkey,
    content,
    created_at: Math.floor(Date.now() / 1000),
    isAgent: sendAsAgent,
    _pending: true,
    _tempId: tempId,
  }
  if (!messages[activeContact.pubkey]) messages[activeContact.pubkey] = []
  messages[activeContact.pubkey].push(tempMsg)
  renderMessages()

  ws.send(JSON.stringify({ type: 'send_message', to: activeContact.pubkey, content, isAgent: sendAsAgent, _tempId: tempId }))
  input.value = ''
  input.style.height = '38px'

  // Mark failed if no confirmation within 10s
  setTimeout(() => {
    const list = messages[activeContact?.pubkey] || []
    const pending = list.find(m => m.id === tempId && m._pending)
    if (pending) {
      pending._pending = false
      pending._failed = true
      if (activeContact?.pubkey === tempMsg.to) renderMessages()
      // Restore failed content to input box for easy retry
      const input = document.getElementById('msgInput')
      if (input && !input.value.trim()) {
        input.value = pending.content
        input.focus()
      }
    }
  }, 10000)
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
}

// ── Modals ─────────────────────────────────────────────────────────────────────

function showAddContact() {
  document.getElementById('addModal').classList.add('show')
  document.getElementById('contactNpub').focus()
}

async function setTrust(pubkey, level) {
  await fetch(`/api/contacts/${pubkey}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ trustLevel: parseInt(level) }),
  })
  // contacts list will update via WebSocket broadcast
}

function showRename(pubkey, currentName) {
  document.getElementById('renamePubkey').value = pubkey
  document.getElementById('renameInput').value = currentName
  document.getElementById('renameModal').classList.add('show')
  document.getElementById('renameInput').focus()
}

function hideModal(id) {
  document.getElementById(id).classList.remove('show')
}

function addContact() {
  const npub = document.getElementById('contactNpub').value.trim()
  const name = document.getElementById('contactName').value.trim()
  if (!npub) return
  ws.send(JSON.stringify({ type: 'add_contact', npub, name }))
  document.getElementById('contactNpub').value = ''
  document.getElementById('contactName').value = ''
  hideModal('addModal')
}

function doRename() {
  const pubkey = document.getElementById('renamePubkey').value
  const name = document.getElementById('renameInput').value.trim()
  if (!name) return
  ws.send(JSON.stringify({ type: 'rename_contact', pubkey, name }))
  hideModal('renameModal')
  // Update chat header if renaming active contact
  if (activeContact?.pubkey === pubkey) {
    activeContact.name = name
    document.querySelector('.chat-header-info .contact-name').textContent = name
  }
}

// ── Utils ──────────────────────────────────────────────────────────────────────

function showError(msg) {
  const toast = document.getElementById('errorToast')
  toast.textContent = msg
  toast.classList.add('show')
  setTimeout(() => toast.classList.remove('show'), 3000)
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('show') })
})

// Handle confirmed sent messages (remove pending state)
const origOnMessage = ws => {
  ws.onmessage = (e) => {
    const { type, data } = JSON.parse(e.data)
    if (type === 'message' && data.from === myIdentity?.pubkey && data._tempId) {
      const key = data.to
      const list = messages[key] || []
      const idx = list.findIndex(m => m.id === data._tempId)
      if (idx !== -1) list.splice(idx, 1)
    }
  }
}

connect()
</script>
</body>
</html>
